<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alice's Workbook</title>
    <link rel="stylesheet" href="Workbook/css/reset.css" />
    <link rel="stylesheet" href="Workbook/css/imageGalleryBuilder.css" />
    <link rel="stylesheet" href="Workbook/css/camera.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-image: url(https://t4.ftcdn.net/jpg/03/06/05/15/360_F_306051599_97duRcSWYUamclvHnatNKWy2HmbzhERg.jpg);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
    </style>
  </head>
  <body>
    <div class="start-screen" id="startScreen">
      <button class="scan-btn" id="startBtn">Initiate Identity Scan</button>
    </div>

    <div class="hud" id="hud">
      <div class="hud-header">
        <span>Access Verification</span>
        <span class="status" id="statusText">Awaiting</span>
      </div>

      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-line"></div>
        <div class="face-box"></div>
      </div>

      <div class="hud-footer">
        SUBJECT: LIVE<br />
        CAMERA: FRONT FEED<br />
        MATCH CONFIDENCE: 97.3%
      </div>
    </div>

    <!-- Hidden at first -->

    <div id="mainContent" style="display: none">
      <h1>Welcome user</h1>
      <p>
        Find below access to research specimen, processes, and construction logs
      </p>
      <div class="nav-buttons">
        <button onclick="location.href = 'Workbook/Week1Home.html'">
          [ WEEK_01 ]
        </button>
        <button onclick="location.href = 'Workbook/Week2Home.html'">
          [ WEEK_02 ]
        </button>
        <button onclick="location.href = 'Workbook/Week3Home.html'">
          [ WEEK_03 ]
        </button>
        <button onclick="location.href = 'Workbook/siteConstructionLog.html'">
          [ SITE_CONSTRUCTION_LOG ]
        </button>
      </div>
    </div>

    <script src="js/camera.js"></script>
  </body>
</html>
