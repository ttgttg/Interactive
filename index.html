<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alice's WWWorkbook</title>
    <link rel="stylesheet" href="Workbook/css/reset.css" />
    <link rel="stylesheet" href="Workbook/css/camera.css" />
    <link rel="stylesheet" href="Workbook/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-image: url("https://i.redd.it/xm05s2iqszh01.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
      }

      .bg-glitch {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image: url("https://i.redd.it/xm05s2iqszh01.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0;
        mix-blend-mode: screen;
      }

      .bg-glitch.active {
        opacity: 0.25;
        animation: glitchFlicker 0.12s infinite steps(2);
      }

      .bg-glitch.heavy {
        opacity: 0.45;
        animation:
          glitchFlicker 0.08s infinite steps(2),
          glitchShift 0.18s infinite steps(2);
      }

      @keyframes glitchFlicker {
        0% {
          transform: translate(0, 0) skewX(0deg);
          filter: hue-rotate(0deg);
        }
        20% {
          transform: translate(-4px, 1px) skewX(1deg);
          filter: hue-rotate(10deg);
        }
        40% {
          transform: translate(4px, -1px) skewX(-1deg);
          filter: hue-rotate(-10deg);
        }
        60% {
          transform: translate(-2px, 2px) skewX(0.5deg);
          filter: hue-rotate(20deg);
        }
        80% {
          transform: translate(3px, -2px) skewX(-0.5deg);
          filter: hue-rotate(-20deg);
        }
        100% {
          transform: translate(0, 0) skewX(0deg);
          filter: hue-rotate(0deg);
        }
      }

      @keyframes glitchShift {
        0% {
          clip-path: inset(0 0 0 0);
        }
        20% {
          clip-path: inset(10% 0 70% 0);
        }
        40% {
          clip-path: inset(55% 0 20% 0);
        }
        60% {
          clip-path: inset(30% 0 35% 0);
        }
        80% {
          clip-path: inset(75% 0 5% 0);
        }
        100% {
          clip-path: inset(0 0 0 0);
        }
      }

      #mainContent {
        position: relative;
        z-index: 1;
      }

      .hud {
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div class="bg-glitch" id="bgGlitch"></div>
    <div class="start-screen" id="startScreen">
      <button class="scan-btn" id="startBtn">Initiate Identity Scan</button>
    </div>

    <div class="hud" id="hud">
      <div class="hud-header">
        <span>Access Verification</span>
        <span class="status" id="statusText">Awaiting</span>
      </div>

      <div class="video-wrap">
        <video id="video" autoplay playsinline muted></video>
        <div class="scan-line"></div>
        <div class="face-box"></div>
      </div>

      <div class="hud-footer">
        SUBJECT: LIVE<br />
        CAMERA: FRONT FEED<br />
        MATCH CONFIDENCE: 97.3%
      </div>
    </div>

    <!-- Hidden at first -->

    <div id="mainContent" style="display: none">
      <h1>Welcome user</h1>
      <p>
        Find below access to research specimen, processes, and construction logs
      </p>
      <div class="nav-buttons">
        <a href="Workbook/weeklyExperiment.html" class="nav-item">
          <img src="Workbook/img/needle.png" alt="WWWEEKLY_EXPERIMENT" />
          <button onclick="location.href = 'Workbook/weeklyExperiment.html'">
            [ WWWEEKLY_EXPERIMENT ]
          </button>
        </a>
        <a href="Workbook/research2.html" class="nav-item">
          <img src="Workbook/img/brain.png" alt="Hunter-gatherer" />
          <button onclick="location.href = 'Workbook/research2.html'">
            [ Hunter-gatherer ]
          </button>
        </a>
        <a href="Workbook/archive.html" class="nav-item">
          <img src="Workbook/img/redcross.png" alt="archive (week 1-3)" />
          <button onclick="location.href = 'Workbook/archive.html'">
            [ archive (week 1-3) ]
          </button>
        </a>
        <a href="Workbook/siteConstructionLog.html" class="nav-item">
          <img
            src="Workbook/img/construction.png"
            alt="construction log"
          />
          <button onclick="location.href = 'Workbook/siteConstructionLog.html'">
            [ SITE_CONSTRUCTION_LOG ]
          </button>
        </a>
      </div>

      <div class="corner-eye" id="cornerEye">
        <img id="cornerEyeImg" src="Workbook/img/eyeball.png" alt="" />
      </div>
    </div>
    <audio id="bg-music" loop>
      <source src="Workbook/audio/monitor.mp3" type="audio/mpeg" />
    </audio>
    <script src="js/camera.js"></script>
  </body>
</html>
