<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weekly Experiments</title>
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&family=Special+Elite&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        cursor: url("img/pyrrhic-tales-prelude-to/1.cur"), auto !important;
        margin: 0;
        padding: 0;
      }

      :root {
        --hot-pink: #ff15b5;
        --neon-green: #36ff27;
        --neon-cyan: #00fff7;
        --neon-yellow: #ffe600;
        --xray-bg: #121212;
        --xray-mid: #1a006a;
      }

      body {
        background: var(--xray-bg);
        font-family: "VT323", monospace;
        color: var(--neon-green);
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      .img-placeholder {
        width: 150px !important;
        height: 130px !important;
      }

      /* ── SCANLINES ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.062) 0px,
          rgba(0, 0, 0, 0.059) 1px,
          transparent 1px,
          transparent 3px
        );
        pointer-events: none;
        z-index: 9000;
      }

      /* ── X-RAY BACKGROUND ── */
      .xray-bg {
        position: fixed;
        inset: 0;
        background-image: url("img/xray2.png"); /*source: https://sc04.alicdn.com/kf/HLB1ApEsS4naK1RjSZFBq6AW7VXa0.jpg inverted via photoshop*/
        filter: saturate(0.9) brightness(0.8);

        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 0;
      }

      /* ── HUD CORNERS ── */
      .hud-corner {
        position: fixed;
        width: 32px;
        height: 32px;
        pointer-events: none;
        z-index: 8000;
      }
      .hud-corner.tl {
        top: 50px;
        left: 10px;
        border-top: 2px solid var(--neon-cyan);
        border-left: 2px solid var(--neon-cyan);
      }
      .hud-corner.tr {
        top: 50px;
        right: 10px;
        border-top: 2px solid var(--neon-cyan);
        border-right: 2px solid var(--neon-cyan);
      }
      .hud-corner.bl {
        bottom: 40px;
        left: 10px;
        border-bottom: 2px solid var(--neon-cyan);
        border-left: 2px solid var(--neon-cyan);
      }
      .hud-corner.br {
        bottom: 40px;
        right: 10px;
        border-bottom: 2px solid var(--neon-cyan);
        border-right: 2px solid var(--neon-cyan);
      }

      /* ── TOP BAR ── */
      .top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 36px;
        background: rgba(255, 21, 181, 0.9);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        z-index: 7000;
        border-bottom: 2px solid var(--neon-cyan);
      }

      .top-bar-title {
        font-size: 18px;
        letter-spacing: 0.15em;
        color: var(--neon-green);
        text-transform: uppercase;
      }

      .top-bar-meta {
        font-size: 16px;
        color: var(--neon-green);
        letter-spacing: 0.1em;
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .top-bar a {
        color: var(--neon-green);
        text-decoration: none;
        border: 1px solid var(--neon-green);
        padding: 1px 8px;
        font-size: 16px;
        pointer-events: all;
      }

      .top-bar a:hover {
        background: var(--neon-green);
        color: var(--hot-pink);
      }

      /* ── BOTTOM BAR ── */
      .bottom-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 28px;
        background: rgba(72, 21, 255, 0.9);
        border-top: 1px solid rgba(0, 255, 247, 0.3);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        font-size: 11px;
        color: rgba(0, 255, 247, 0.6);
        letter-spacing: 0.1em;
        z-index: 7000;
        pointer-events: none;
      }

      .bottom-bar .blink {
        animation: blink 1.1s steps(1) infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      /* ── X-RAY OBJECT (draggable item) ── */
      .xray-item {
        position: absolute;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        z-index: 100;
        user-select: none;
      }

      .xray-item-inner {
        position: relative;
      }

      .xray-item:hover .xray-item-inner::before {
        color: var(--neon-green) !important;
        background-color:var(--hot-pink);
      }

      /* the X-ray CSS filter */
      .xray-item img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        mix-blend-mode: screen;
        opacity: 0.85;
        transition:
          filter 0.2s,
          opacity 0.2s;
      }

      .xray-item:hover img {
        filter: invert(1) sepia(1) hue-rotate(120deg) saturate(6)
          brightness(1.4) contrast(1.4);
        opacity: 1;
      }

      /* bounding box label */
      .xray-item-inner::before {
        content: attr(data-label);
        position: absolute;
        top: -22px;
        left: 0px;
        font-size: 16px;
        color: var(--neon-green);
        letter-spacing: 0.08em;
        white-space: nowrap;
        background: rgb(0, 0, 0);
        padding: 1px 5px;
        pointer-events: none;
      }

      /* detection box outline */
      .xray-item-inner::after {
        content: "";
        position: absolute;
        inset: -4px;
        border: 2px solid;
        pointer-events: none;
        opacity: 1;
      }

      /* link label */
      .xray-label {
        font-size: 18px;
        letter-spacing: 0.1em;
        text-align: center;
        padding: 2px 8px;
        background: var(--hot-pink);
        color: var(--neon-green);
        text-decoration: none;
        text-transform: uppercase;
        pointer-events: all;
        white-space: nowrap;
        transition: background 0.1s;
      }

      .xray-label:hover {
        background: var(--neon-green);
        color: var(--hot-pink);
      }

      /* color variants for each item's box */
      .xray-item.c-pink .xray-item-inner::after {
        border-color: #ff15b5;
      }
      .xray-item.c-cyan .xray-item-inner::after {
        border-color: #00fff7;
      }
      .xray-item.c-yellow .xray-item-inner::after {
        border-color: #ffe600;
      }
      .xray-item.c-green .xray-item-inner::after {
        border-color: #36ff27;
      }
      .xray-item.c-orange .xray-item-inner::after {
        border-color: #ff6600;
      }
      .xray-item.c-purple .xray-item-inner::after {
        border-color: #cc00ff;
      }

      .xray-item.c-pink .xray-item-inner::before {
        color: #ff15b5;
      }
      .xray-item.c-cyan .xray-item-inner::before {
        color: #00fff7;
      }
      .xray-item.c-yellow .xray-item-inner::before {
        color: #ffe600;
      }
      .xray-item.c-green .xray-item-inner::before {
        color: #36ff27;
      }
      .xray-item.c-orange .xray-item-inner::before {
        color: #ff6600;
      }
      .xray-item.c-purple .xray-item-inner::before {
        color: #cc00ff;
      }

      /* placeholder box when no image */
      .img-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.06em;
        text-align: center;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.05);
        padding: 4px;
      }

      /* glitch */
      .glitch-layer {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 6000;
        opacity: 0;
      }
      .glitch-layer.active {
        animation: colorGlitch 0.2s steps(2) forwards;
      }
      @keyframes colorGlitch {
        0% {
          opacity: 0;
        }
        10% {
          opacity: 1;
          background: rgba(255, 0, 80, 0.12);
          clip-path: inset(0% 0 75% 0);
          transform: translateX(-8px) skewX(-2deg);
        }
        25% {
          background: rgba(0, 255, 200, 0.1);
          clip-path: inset(55% 0 5% 0);
          transform: translateX(6px) skewX(1deg);
        }
        40% {
          background: rgba(255, 220, 0, 0.1);
          clip-path: inset(25% 0 50% 0);
          transform: translateX(-5px);
        }
        55% {
          background: rgba(120, 0, 255, 0.1);
          clip-path: inset(70% 0 8% 0);
          transform: translateX(9px) skewX(-1deg);
        }
        70% {
          opacity: 0.6;
          background: rgba(255, 0, 200, 0.08);
          clip-path: inset(40% 0 30% 0);
          transform: translateX(-4px);
        }
        85% {
          opacity: 0.3;
        }
        100% {
          opacity: 0;
          transform: translateX(0);
        }
      }
    </style>

    <script>
      // clock
      function tick() {
        const t = new Date().toLocaleTimeString("en-GB", { hour12: false });
        const d = new Date().toLocaleDateString("en-GB").replace(/\//g, "-");
        document.getElementById("topTime").textContent = d + "  " + t;
        document.getElementById("botTime").textContent = t;
      }
      setInterval(tick, 1000);
      tick();

      // subject name from localStorage
      const n = localStorage.getItem("username") || "UNKNOWN";
      document.getElementById("botSubject").textContent = n.toUpperCase();

      // dragging
      document.querySelectorAll(".xray-item").forEach((el) => {
        let isDragging = false;
        let startX, startY, origLeft, origTop;

        el.addEventListener("mousedown", (e) => {
          if (e.target.tagName === "A") return;
          startX = e.clientX;
          startY = e.clientY;
          origLeft = el.offsetLeft;
          origTop = el.offsetTop;
          isDragging = false;
          e.preventDefault();

          const onMove = (e) => {
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
            el.style.left = origLeft + dx + "px";
            el.style.top = origTop + dy + "px";
          };

          const onUp = () => {
            document.removeEventListener("mousemove", onMove);
            document.removeEventListener("mouseup", onUp);
            setTimeout(() => {
              isDragging = false;
            }, 0);
          };

          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
        });

        el.addEventListener("click", (e) => {
          if (isDragging) e.preventDefault();
        });
      });

      // glitch
      const gl = document.getElementById("glitchLayer");
      function glitch() {
        gl.classList.remove("active");
        void gl.offsetWidth;
        gl.classList.add("active");
        setTimeout(() => gl.classList.remove("active"), 160);
        setTimeout(glitch, 2000 + Math.random() * 2000);
      }
      glitch();
    </script>
